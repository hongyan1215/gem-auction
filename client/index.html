<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gem Auction · 寶石盲拍</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1e 100%); color: #e8e8f0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .gem { width: 28px; height: 28px; border-radius: 50%; display: inline-block; box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.4); }
  .gem-RUBY      { background: radial-gradient(circle at 30% 30%, #ff6b8a, #c41e3a); }
  .gem-SAPPHIRE  { background: radial-gradient(circle at 30% 30%, #6fa8ff, #1e3a8a); }
  .gem-EMERALD   { background: radial-gradient(circle at 30% 30%, #6fee8a, #047857); }
  .gem-TOPAZ     { background: radial-gradient(circle at 30% 30%, #ffd76f, #d97706); }
  .gem-AMETHYST  { background: radial-gradient(circle at 30% 30%, #d68fff, #7c3aed); }
  .gem-hidden    { background: radial-gradient(circle at 30% 30%, #555, #222); }
  .glow { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
  .pulse-ring { animation: pulse-ring 1.5s infinite; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); } 70% { box-shadow: 0 0 0 12px rgba(255,215,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); } }
  .card-bg { background: linear-gradient(135deg, #2d2d44 0%, #1f1f33 100%); border: 1px solid #404060; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const GEM_TYPES = ['RUBY', 'SAPPHIRE', 'EMERALD', 'TOPAZ', 'AMETHYST'];
const GEM_LABEL = { RUBY: '紅寶', SAPPHIRE: '藍寶', EMERALD: '綠寶', TOPAZ: '黃寶', AMETHYST: '紫晶' };
const Vfn = (n) => n <= 0 ? 0 : Math.min(4 * n, 20);

function Gem({ type, size = 28, hidden = false, onClick, title }) {
  const t = title || (hidden ? '隱藏寶石' : (GEM_LABEL[type] || type));
  return <span title={t} onClick={onClick} className={'gem gem-' + (hidden ? 'hidden' : type) + (onClick ? ' cursor-pointer hover:scale-110 transition' : '')} style={{ width: size, height: size }} />;
}

function Tip({ text, children, side = 'top' }) {
  if (!text) return children;
  const pos = side === 'top'
    ? 'bottom-full left-1/2 -translate-x-1/2 mb-1'
    : side === 'bottom' ? 'top-full left-1/2 -translate-x-1/2 mt-1'
    : side === 'left' ? 'right-full top-1/2 -translate-y-1/2 mr-1'
    : 'left-full top-1/2 -translate-y-1/2 ml-1';
  return (
    <span className="relative group inline-block align-middle">
      {children}
      <span className={'pointer-events-none absolute z-50 whitespace-pre-line text-[11px] leading-tight px-2 py-1 rounded bg-slate-900/95 ring-1 ring-amber-400/40 text-slate-100 shadow-lg opacity-0 group-hover:opacity-100 transition w-max max-w-[220px] ' + pos}>
        {text}
      </span>
    </span>
  );
}

function Countdown({ deadline }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), 100); return () => clearInterval(id); }, []);
  const ms = Math.max(0, deadline - now);
  const pct = Math.min(100, ms / 100);
  const sec = (ms / 1000).toFixed(1);
  return (
    <div className="w-full">
      <div className="flex justify-between text-xs mb-1"><span>倒數</span><span className="font-mono text-amber-300">{sec}s</span></div>
      <div className="h-2 bg-slate-700 rounded overflow-hidden">
        <div className={'h-full transition-all duration-100 ' + (ms < 3000 ? 'bg-rose-500' : 'bg-amber-400')} style={{ width: pct + '%' }} />
      </div>
    </div>
  );
}

function MissionBadge({ m, large }) {
  const gemRow = (gems) => (
    <div className="flex gap-1 items-center">
      {gems.map((g, i) => <Gem key={i} type={g} size={large ? 28 : 18} />)}
    </div>
  );
  let body, points, tip;
  if (m.type === 'TWO_SPECIFIC') { body = gemRow(m.gems); points = '+5'; tip = `任務：在「已得寶石」中湊齊 ${m.gems.map(g => GEM_LABEL[g]).join(' + ')}，+5 分（先到先得）`; }
  else if (m.type === 'THREE_SPECIFIC') { body = gemRow(m.gems); points = '+10'; tip = `任務：在「已得寶石」中湊齊 ${m.gems.map(g => GEM_LABEL[g]).join(' + ')}，+10 分（先到先得）`; }
  else if (m.type === 'FOUR_DIFFERENT') {
    body = (<div className="flex gap-1 items-center text-[10px]"><span>🌈</span><span>4 種不同</span></div>);
    points = '+10';
    tip = '任務：「已得寶石」中包含至少 4 種不同顏色，+10 分（先到先得）';
  }
  else if (m.type === 'THREE_OF_A_KIND') {
    body = (<div className="flex gap-1 items-center text-[10px]"><span>💎×3</span><span>同色</span></div>);
    points = '+10';
    tip = '任務：「已得寶石」中有 3 顆同色，+10 分（先到先得）';
  }
  const claimedTip = m.completedBy ? ` · 已被 ${m.completedByName || '某玩家'} 達成` : '';
  return (
    <Tip text={(tip || '') + claimedTip} side="bottom">
      <div className={'p-2 rounded transition-all ' + (m.completedBy ? 'bg-emerald-900/40 ring-1 ring-emerald-500/40 opacity-60' : 'card-bg ring-1 ring-slate-700') + (large ? ' p-3' : '')}>
        <div className="flex items-center justify-between gap-2">
          {body}
          <span className={'text-xs font-bold ' + (m.completedBy ? 'text-emerald-300 line-through' : 'text-amber-300')}>{points}</span>
        </div>
        {m.completedBy && <div className="text-[10px] mt-1 text-emerald-300">✓ 已完成</div>}
      </div>
    </Tip>
  );
}

function ValueTable({ snap, viewerHidden }) {
  // V(n) estimate: visible revealed + own hidden
  const c = {};
  for (const p of snap.players) for (const g of p.revealedGems) c[g] = (c[g] || 0) + 1;
  for (const g of (viewerHidden || [])) c[g] = (c[g] || 0) + 1;
  // unknown hidden = totalHidden - own's
  const totalKnown = Object.values(c).reduce((a, b) => a + b, 0);
  const totalHidden = snap.players.reduce((a, p) => a + p.hiddenCount, 0) + (viewerHidden ? viewerHidden.length : 0);
  // Also +revealed but already counted
  return (
    <div className="card-bg rounded-lg p-3">
      <div className="text-xs uppercase tracking-wide opacity-70 mb-2">寶石價值表 V(n) <span className="text-[10px]">已知n / 預估</span></div>
      <div className="grid grid-cols-5 gap-2">
        {GEM_TYPES.map(t => {
          const n = c[t] || 0;
          return (
            <Tip key={t} text={`${GEM_LABEL[t]}：目前可見 ${n} 顆，預估價值至少 ${Vfn(n)} 分／顆\n結算公式 V(n)=min(4n,20)\n(被拍走的同色越多→該色越廢)`} side="bottom">
              <div className="text-center">
                <Gem type={t} size={24} />
                <div className="text-xs mt-1">n≥{n}</div>
                <div className="text-amber-300 font-mono text-sm">{Vfn(n)}+</div>
              </div>
            </Tip>
          );
        })}
      </div>
    </div>
  );
}

function CardDisplay({ card, lot }) {
  if (!card) return <div className="text-slate-500">等待開牌…</div>;
  let label, color, tip;
  if (card.kind === 'AUCTION_GEM') { label = '寶石拍賣 ×' + (card.size); color = 'from-amber-700 to-amber-900'; tip = `得標者付出價，獲得 ${card.size} 顆寶石進「已得寶石」(可計任務)`; }
  else if (card.kind === 'INVEST') { label = '投資 +' + card.value + '分'; color = 'from-emerald-700 to-emerald-900'; tip = `押金扣下不返還，遊戲結束時退回押金 + 加 ${card.value} 分`; }
  else if (card.kind === 'LOAN') { label = '貸款 ' + card.value + '/-' + card.value; color = 'from-rose-700 to-rose-900'; tip = `立刻拿到 (${card.value} - 出價) 金幣，結算時 -${card.value} 分`; }
  return (
    <Tip text={tip} side="bottom">
      <div className={'rounded-lg bg-gradient-to-br ' + color + ' p-4 glow pulse-ring cursor-help'}>
        <div className="text-xs opacity-80">本回合拍賣</div>
        <div className="text-xl font-bold">{label}</div>
        {lot && lot.length > 0 && (
          <div className="mt-3 flex gap-2">{lot.map((g, i) => <Gem key={i} type={g} size={36} />)}</div>
        )}
      </div>
    </Tip>
  );
}

function PlayerCard({ p, isMe, isWinner, onReveal, canReveal, bidShown }) {
  return (
    <div className={'card-bg rounded-lg p-3 transition-all ' + (isMe ? 'ring-2 ring-amber-400' : '') + (isWinner ? ' ring-4 ring-yellow-300 glow scale-105 bg-gradient-to-br from-yellow-900/40 to-amber-900/40' : '')}>
      {isWinner && <div className="text-yellow-300 text-xs font-bold mb-1">🏆 本回合得標</div>}
      <div className="flex justify-between items-start">
        <div>
          <div className="text-sm font-bold">{p.name} {p.isBot && <span className="text-[10px] opacity-60">(AI)</span>}</div>
          <div className="text-xs opacity-70">座位 {p.seat + 1}</div>
        </div>
        <div className="text-right">
          <Tip text="持有金幣（公開）。本回合最高出價上限。" side="left">
            <div className="text-amber-300 font-mono text-lg cursor-help">${p.money}</div>
          </Tip>
          {p.score > 0 && <Tip text="任務累積加分（公開，不可用於拍賣）" side="left"><div className="text-emerald-300 text-xs cursor-help">+{p.score}分</div></Tip>}
        </div>
      </div>
      <div className="mt-2">
        <Tip text="拍賣得標的寶石（公開）。會被任務檢查、結算時用 V(n) 計分。" side="bottom">
          <div className="text-[10px] opacity-60 cursor-help">已得寶石 ({p.wonGems.length}) ⓘ</div>
        </Tip>
        <div className="flex flex-wrap gap-1 mt-1 min-h-[20px]">
          {p.wonGems.map((g, i) => <Gem key={i} type={g} size={18} />)}
        </div>
      </div>
      <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
        <div>
          <Tip text="得標時被迫公開的隱藏寶石。會列入 V(n) 但不算任務寶石。" side="top">
            <div className="opacity-60 cursor-help">公開隱藏 ({p.revealedGems.length}) ⓘ</div>
          </Tip>
          <div className="flex flex-wrap gap-0.5">{p.revealedGems.map((g, i) => <Gem key={i} type={g} size={16} />)}</div>
        </div>
        <div>
          <Tip text="尚未公開的寶石。對手只看到顆數。" side="top">
            <div className="opacity-60 cursor-help">未知隱藏 ({p.hiddenCount}) ⓘ</div>
          </Tip>
          <div className="flex flex-wrap gap-0.5">
            {isMe && p.hiddenGems
              ? p.hiddenGems.map((g, i) => (
                  <Gem key={i} type={g} size={16} title={canReveal ? '點擊公開' : ''} onClick={canReveal ? () => onReveal(g) : null} />
                ))
              : Array.from({ length: p.hiddenCount }).map((_, i) => <Gem key={i} hidden size={16} />)}
          </div>
        </div>
      </div>
      {((p.investments && p.investments.length) || (p.loans && p.loans.length)) && (
        <div className="mt-2 flex flex-wrap gap-2 text-[11px]">
          {p.investments && p.investments.length > 0 && (() => {
            const face = p.investments.reduce((a, x) => a + x.value, 0);
            const paid = p.investments.reduce((a, x) => a + x.paid, 0);
            return <span className="text-emerald-300" title={`持有 ${p.investments.length} 張投資卡，結算時 +${face} 分並退回押金 $${paid}`}>投資 +{face}（押 ${paid}）</span>;
          })()}
          {p.loans && p.loans.length > 0 && (() => {
            const face = p.loans.reduce((a, x) => a + x.value, 0);
            const interest = p.loans.reduce((a, x) => a + x.interest, 0);
            return <span className="text-rose-300" title={`持有 ${p.loans.length} 張貸款卡，結算時 -${face} 分（已付利息 $${interest}）`}>貸款 -{face}（利 ${interest}）</span>;
          })()}
        </div>
      )}
      {bidShown != null && <div className="mt-1 text-[11px] text-amber-300 font-mono">本回合出價 ${bidShown}</div>}
      {bidShown == null && p.hasBid && <div className="mt-1 text-[10px] text-amber-400">✓ 已出價</div>}
      {bidShown == null && !p.hasBid && p.connected !== false && <div className="mt-1 text-[10px] opacity-50">思考中…</div>}
    </div>
  );
}

function BidInput({ snap, me, onSubmit }) {
  const [amt, setAmt] = useState(0);
  const [submitted, setSubmitted] = useState(null);
  useEffect(() => { setSubmitted(null); setAmt(0); }, [snap.round]);
  const max = me ? me.money : 0;
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), 200); return () => clearInterval(id); }, []);
  const remain = Math.max(0, snap.bidDeadline - now);
  const urgent = remain < 4000;
  const submit = () => { onSubmit(amt); setSubmitted(amt); };
  return (
    <div className={'card-bg rounded-lg p-4 transition-all relative ' + (urgent ? 'ring-2 ring-rose-500 animate-pulse' : 'ring-2 ring-amber-400/30')}>
      {snap.round === 1 && submitted == null && (
        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-amber-400 text-slate-900 text-xs font-bold rounded shadow animate-bounce">👇 拉滑桿出價，然後按確認</div>
      )}
      <div className="flex justify-between items-center mb-2">
        <div className="text-xs uppercase tracking-wide opacity-80">你的出價 <span className="opacity-60">(上限 ${max})</span></div>
        <div className={'text-2xl font-mono font-bold ' + (urgent ? 'text-rose-400' : 'text-amber-300')}>{(remain / 1000).toFixed(1)}s</div>
      </div>
      <div className="flex items-center gap-3">
        <input type="range" min="0" max={max} value={amt} disabled={submitted != null}
               onChange={(e) => setAmt(parseInt(e.target.value))} className="flex-1 disabled:opacity-50" />
        <input type="number" min="0" max={max} value={amt} disabled={submitted != null}
               onChange={(e) => setAmt(Math.max(0, Math.min(max, parseInt(e.target.value) || 0)))}
               className="w-20 bg-slate-800 rounded px-2 py-1 text-amber-300 font-mono disabled:opacity-50" />
        {submitted == null ? (
          <button onClick={submit}
                  className="px-5 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded">
            確認 ${amt}
          </button>
        ) : (
          <div className="px-4 py-2 bg-emerald-700/50 text-emerald-200 rounded text-sm font-bold">
            🔒 已鎖定 ${submitted}
          </div>
        )}
      </div>
      {submitted == null && <div className="mt-2 text-[11px] text-rose-300/80">⏰ 沒在時限內出價將自動視為 $0</div>}
    </div>
  );
}

function Lobby({ socket, onState }) {
  const [name, setName] = useState(localStorage.getItem('ga_name') || '');
  const [code, setCode] = useState('');
  const [room, setRoom] = useState(null);
  const [error, setError] = useState('');
  const [iAmHost, setIAmHost] = useState(false);

  useEffect(() => {
    if (!socket) return;
    const onLobby = (lobby) => setRoom(lobby);
    socket.on('lobby', onLobby);
    return () => socket.off('lobby', onLobby);
  }, [socket]);

  const create = () => {
    if (!name.trim()) return setError('請輸入名字');
    localStorage.setItem('ga_name', name);
    socket.emit('createRoom', { name }, (r) => {
      if (r.ok) { setRoom({ code: r.code, members: [r.you], started: false }); setIAmHost(true); }
      else setError('建立失敗');
    });
  };
  const join = () => {
    if (!name.trim() || !code.trim()) return setError('請輸入名字與房號');
    localStorage.setItem('ga_name', name);
    socket.emit('joinRoom', { code, name }, (r) => {
      if (r.ok) { setIAmHost(false); }
      else setError(r.reason === 'no_room' ? '房號不存在' : r.reason === 'full' ? '房間已滿' : '已開始');
    });
  };
  const start = () => socket.emit('startGame', {}, (r) => { if (!r.ok) setError(r.reason); });

  return (
    <div className="max-w-md mx-auto mt-12 card-bg rounded-xl p-6">
      <h1 className="text-3xl font-bold mb-2">💎 寶石盲拍</h1>
      <p className="text-sm opacity-70 mb-6">5 人即時盲標 · 隱藏資訊 · 任務解鎖</p>

      <input className="w-full bg-slate-800 rounded p-2 mb-3" placeholder="你的名字" value={name} onChange={(e) => setName(e.target.value)} />

      {!room ? (
        <>
          <button onClick={create} className="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-2 rounded mb-3">建立房間</button>
          <div className="flex gap-2">
            <input className="flex-1 bg-slate-800 rounded p-2 uppercase" placeholder="房號 (例: ABCD)" value={code} onChange={(e) => setCode(e.target.value.toUpperCase())} />
            <button onClick={join} className="px-4 bg-slate-700 hover:bg-slate-600 rounded">加入</button>
          </div>
          <details className="mt-4 text-xs opacity-70">
            <summary className="cursor-pointer">遊戲說明</summary>
            <ul className="list-disc pl-5 mt-2 space-y-1">
              <li>每人起始 $20、3 顆隱藏寶石。</li>
              <li>每回合翻一張卡：拍賣寶石 / 投資 / 貸款。</li>
              <li>10 秒內盲標出價，最高得標。</li>
              <li>得標寶石被迫公開 1 顆隱藏寶石（影響市價）。</li>
              <li>寶石價值 V(n)=min(4n, 20)，n=未進入拍賣的同色數。</li>
              <li>15 顆寶石全部拍完即結算。</li>
            </ul>
          </details>
        </>
      ) : (
        <>
          <div className="text-center mb-4">
            <div className="text-xs opacity-60">房號</div>
            <div className="text-4xl font-mono font-bold tracking-widest text-amber-300">{room.code}</div>
            <div className="text-xs mt-1 opacity-60">分享給朋友 (空位由 AI 補)</div>
          </div>
          <div className="space-y-2 mb-4">
            {room.members.map(m => (
              <div key={m.id} className="bg-slate-800 rounded px-3 py-2 flex justify-between">
                <span>{m.name}</span>
                <span className="text-xs opacity-50">{m.id === room.members[0].id ? '房主' : ''}</span>
              </div>
            ))}
            {Array.from({ length: 5 - room.members.length }).map((_, i) => (
              <div key={i} className="bg-slate-800/50 rounded px-3 py-2 text-slate-500 text-sm">空位 (AI)</div>
            ))}
          </div>
          {iAmHost && <button onClick={start} className="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-2 rounded">開始遊戲</button>}
          {!iAmHost && <div className="text-center text-sm opacity-70">等待房主開始…</div>}
        </>
      )}
      {error && <div className="mt-3 text-rose-400 text-sm">{error}</div>}
    </div>
  );
}

function GameOver({ snap }) {
  const r = snap.endgame.results;
  return (
    <div className="card-bg rounded-xl p-6 max-w-3xl mx-auto">
      <h2 className="text-2xl font-bold mb-4">🏆 結算 · {r[0].name} 獲勝!</h2>
      <table className="w-full text-sm">
        <thead><tr className="text-left opacity-60"><th>名次</th><th>玩家</th><th>金幣</th><th>寶石</th><th>投資</th><th>貸款</th><th>任務</th><th>總分</th></tr></thead>
        <tbody>
          {r.map((p, i) => (
            <tr key={p.id} className={i === 0 ? 'text-amber-300 font-bold' : ''}>
              <td>#{i + 1}</td><td>{p.name}</td><td>${p.money}</td><td>{p.gemScore}</td><td>+{p.investBonus}</td><td>-{p.loanPenalty}</td><td>+{p.missionScore}</td><td className="text-lg">{p.total}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className="mt-4 text-xs opacity-60">
        最終市價: {GEM_TYPES.map(t => `${GEM_LABEL[t]} ${snap.endgame.finalValue[t]}`).join(' · ')}
      </div>
      <button onClick={() => location.reload()} className="mt-4 px-4 py-2 bg-amber-500 text-slate-900 rounded font-bold">再玩一局</button>
    </div>
  );
}

function HelpModal({ onClose }) {
  return (
    <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={onClose}>
      <div className="card-bg rounded-xl p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto ring-2 ring-amber-400/60" onClick={(e) => e.stopPropagation()}>
        <div className="flex justify-between items-start mb-4">
          <h2 className="text-2xl font-bold text-amber-300">📖 規則速查</h2>
          <button onClick={onClose} className="text-xl opacity-60 hover:opacity-100">✕</button>
        </div>
        <div className="space-y-4 text-sm">
          <section>
            <h3 className="font-bold text-amber-200 mb-1">🎯 目標</h3>
            <p className="opacity-80">分數最高者獲勝。總分 = 剩餘金幣 + 寶石價值 + 投資面額 - 貸款面額 + 任務加分。</p>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">💰 起始狀態</h3>
            <ul className="list-disc pl-5 space-y-1 opacity-80">
              <li>每人 $20、3 顆<b>隱藏寶石</b>（只有自己看得到）</li>
              <li>15 顆寶石進拍賣池，剩 15 顆分給玩家當隱藏</li>
            </ul>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">🔄 回合流程</h3>
            <ol className="list-decimal pl-5 space-y-1 opacity-80">
              <li><b>翻卡</b>：拍賣 1/2 顆寶石、投資、或貸款</li>
              <li><b>盲拍 15 秒</b>：所有人同時暗標，超時視為 $0</li>
              <li><b>結算</b>：最高價得標，公開所有出價</li>
              <li><b>強制公開</b>：得標者選一顆隱藏寶石公開（10 秒，超時隨機）</li>
            </ol>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">💎 寶石價值 V(n)</h3>
            <p className="opacity-80"><code className="bg-slate-800 px-1 rounded">V(n) = min(4n, 20)</code>，n = 結算時「沒被拍走」的同色寶石數</p>
            <ul className="list-disc pl-5 space-y-1 opacity-80 text-xs mt-1">
              <li>n=0 → 0 分（被拍光的色變廢石）</li>
              <li>n=1 → 4、n=2 → 8、n=3 → 12、n=4 → 16、n=5+ → 20（封頂）</li>
              <li><b>策略</b>：競標一色 = 一邊降它的 V，一邊讓對手手上同色變廢</li>
            </ul>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">⚖️ 平手規則</h3>
            <p className="opacity-80">出價相同 → 從上輪得標者「左手邊（順時針）」算最近者勝。第 1 輪隨機。</p>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">📈 投資 / 📉 貸款</h3>
            <ul className="list-disc pl-5 space-y-1 opacity-80">
              <li><b>投資 (Invest)</b>：押金扣下，結算時退回押金 + 加面額分數（5 或 10）</li>
              <li><b>貸款 (Loan)</b>：立刻拿到 (面額 - 出價) 金幣，結算時扣面額 (10 或 20)</li>
            </ul>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">🎯 任務</h3>
            <p className="opacity-80">公開 4 題，先達成者獨佔分數（其他人不能再拿同題）。</p>
          </section>
          <section>
            <h3 className="font-bold text-amber-200 mb-1">🏁 結束</h3>
            <p className="opacity-80">15 顆拍賣寶石全部拍完即結算。</p>
          </section>
        </div>
        <button onClick={onClose} className="mt-4 w-full py-2 bg-amber-500 text-slate-900 font-bold rounded">關閉</button>
      </div>
    </div>
  );
}

function RevealPicker({ me, onReveal, deadline }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), 200); return () => clearInterval(id); }, []);
  const remain = Math.max(0, deadline - now);
  return (
    <div className="card-bg rounded-xl p-5 ring-2 ring-yellow-400 bg-gradient-to-br from-yellow-900/30 to-amber-900/20">
      <div className="flex justify-between items-center mb-3">
        <div>
          <div className="text-yellow-300 font-bold text-lg">🎁 你得標了！選一顆隱藏寶石公開</div>
          <div className="text-xs opacity-70 mt-1">公開的寶石會影響全場市價推算（公開越多、剩下的同色越值錢）</div>
        </div>
        <div className="text-2xl font-mono font-bold text-yellow-300">{(remain / 1000).toFixed(1)}s</div>
      </div>
      <div className="flex gap-3 flex-wrap justify-center py-3">
        {me.hiddenGems.map((g, i) => (
          <button key={i} onClick={() => onReveal(g)}
                  className="hover:scale-110 transition-transform p-2 rounded-lg bg-slate-800/80 hover:bg-yellow-500/20 ring-1 ring-slate-600 hover:ring-yellow-400">
            <Gem type={g} size={48} />
            <div className="text-[10px] mt-1 opacity-70">{GEM_LABEL[g]}</div>
          </button>
        ))}
      </div>
      <div className="text-[11px] text-center opacity-60 mt-2">⏰ 時間到隨機公開</div>
    </div>
  );
}

function OpeningOverlay({ snap, onClose }) {
  return (
    <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={onClose}>
      <div className="card-bg rounded-xl p-6 max-w-2xl w-full ring-2 ring-amber-400/60" onClick={(e) => e.stopPropagation()}>
        <h2 className="text-2xl font-bold text-amber-300 mb-3">🎯 本局任務</h2>
        <p className="text-sm opacity-70 mb-4">完成下列任務（先搶先贏，每題只算第一個達成者）</p>
        <div className="grid grid-cols-2 gap-3 mb-4">
          {snap.missions.map((m, i) => <MissionBadge key={i} m={m} large />)}
        </div>
        <div className="text-xs opacity-60 mb-3 space-y-1">
          <div>💰 起始 $20、3 顆隱藏寶石｜⏱️ 每回合 15 秒盲標｜🏆 拍完 15 顆寶石結算</div>
          <div>📊 寶石分數 V(n)=min(4n,20)，n = 沒被拍走的同色數</div>
        </div>
        <button onClick={onClose} className="w-full py-2 bg-amber-500 text-slate-900 font-bold rounded">開始遊戲</button>
      </div>
    </div>
  );
}

function Game({ snap, socket, myId }) {
  const me = snap.players.find(p => p.id === myId);
  const others = snap.players.filter(p => p.id !== myId);
  const winnerSeat = snap.winner ? snap.winner.seat : null;
  const showBids = snap.phase === 'AWAITING_REVEAL' || snap.phase === 'RESOLVING';
  const bidOf = (pid) => (showBids && snap.bidsPublic ? (snap.bidsPublic[pid] != null ? snap.bidsPublic[pid] : null) : null);
  const [showOpening, setShowOpening] = useState(true);
  const [showHelp, setShowHelp] = useState(false);
  useEffect(() => { if (snap.round > 1) setShowOpening(false); }, [snap.round]);

  const onBid = (amount) => socket.emit('submitBid', { amount });
  const onReveal = (gem) => socket.emit('reveal', { gem });

  const canReveal = snap.phase === 'AWAITING_REVEAL' && snap.winner && snap.winner.playerId === myId;

  if (snap.phase === 'GAME_OVER') return <GameOver snap={snap} />;

  // Build tie-order name string (skip round 1)
  let tieHint = null;
  if (snap.phase === 'BIDDING' && snap.tieOrder && snap.round > 1) {
    const names = snap.tieOrder.map(seat => snap.players[seat]?.name).filter(Boolean);
    tieHint = names.join(' → ');
  }

  return (
    <div className="grid grid-cols-12 gap-4 max-w-7xl mx-auto p-4">
      {showOpening && snap.round === 1 && <OpeningOverlay snap={snap} onClose={() => setShowOpening(false)} />}
      {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
      <button onClick={() => setShowHelp(true)} className="fixed bottom-4 right-4 z-40 px-4 py-2 rounded-full bg-amber-500/90 hover:bg-amber-400 text-slate-900 font-bold shadow-lg ring-2 ring-amber-300/50" title="開啟規則速查 (?)">📖 規則</button>
      {/* Top: opponents */}
      <div className="col-span-12 grid grid-cols-4 gap-3">
        {others.map(p => <PlayerCard key={p.id} p={p} isWinner={p.seat === winnerSeat && (snap.phase === 'AWAITING_REVEAL' || snap.phase === 'RESOLVING')} bidShown={bidOf(p.id)} />)}
      </div>

      {/* Center */}
      <div className="col-span-12 lg:col-span-8 space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <CardDisplay card={snap.currentCard} lot={snap.currentLot} />
          <div className="card-bg rounded-lg p-3">
            <div className="text-xs uppercase tracking-wide opacity-70 mb-2">展示區 (待拍賣)</div>
            <div className="flex gap-2 min-h-[40px] items-center">
              {snap.market.map((g, i) => <Gem key={i} type={g} size={32} />)}
              {snap.market.length === 0 && <span className="text-slate-500 text-sm">無</span>}
            </div>
            <div className="mt-2 text-xs opacity-60">回合 {snap.round} · 剩餘寶石待拍 {15 - snap.gemsAuctionedCount}</div>
          </div>
        </div>

        {snap.phase === 'BIDDING' && (
          <>
            <Countdown deadline={snap.bidDeadline} />
            {tieHint && <div className="text-xs text-amber-200/80 bg-slate-800/50 rounded px-3 py-2">⚖️ 平手優先序：{tieHint}</div>}
          </>
        )}
        {snap.phase === 'AWAITING_REVEAL' && (
          canReveal && me && me.hiddenGems && me.hiddenGems.length > 0 ? (
            <RevealPicker me={me} onReveal={onReveal} deadline={snap.revealDeadline} />
          ) : (
            <div className="card-bg rounded-lg p-4 bg-gradient-to-r from-yellow-900/40 to-amber-900/30 ring-2 ring-yellow-400/60">
              <div className="text-yellow-200 font-bold text-lg">🏆 {snap.players[snap.winner.seat].name} 以 ${snap.winner.amount} 得標！</div>
              <div className="mt-1 text-xs opacity-70">等待 {snap.players[snap.winner.seat].name} 公開隱藏寶石…</div>
              <Countdown deadline={snap.revealDeadline} />
            </div>
          )
        )}
        {snap.phase === 'RESOLVING' && (
          <div className="card-bg rounded-lg p-3 bg-emerald-900/20">
            <div className="text-amber-300 font-bold">{snap.players[snap.winner.seat].name} 以 ${snap.winner.amount} 得標!</div>
          </div>
        )}

        <ValueTable snap={snap} viewerHidden={me ? me.hiddenGems : null} />

        <div className="card-bg rounded-lg p-3">
          <div className="text-xs uppercase tracking-wide opacity-70 mb-2">公開任務</div>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-2">
            {snap.missions.map((m, i) => <MissionBadge key={i} m={m} />)}
          </div>
        </div>
      </div>

      {/* Right: me */}
      <div className="col-span-12 lg:col-span-4 space-y-3">
        {me && <PlayerCard p={me} isMe isWinner={me.seat === winnerSeat && (snap.phase === 'AWAITING_REVEAL' || snap.phase === 'RESOLVING')} onReveal={onReveal} canReveal={canReveal} bidShown={bidOf(me.id)} />}
        {snap.phase === 'BIDDING' && me && <BidInput snap={snap} me={me} onSubmit={onBid} />}
      </div>
    </div>
  );
}

function App() {
  const [socket, setSocket] = useState(null);
  const [snap, setSnap] = useState(null);
  const [myId, setMyId] = useState(null);

  useEffect(() => {
    const s = io();
    setSocket(s);
    s.on('state', (st) => setSnap(st));
    s.on('connect', () => console.log('connected', s.id));
    return () => s.disconnect();
  }, []);

  // Capture myId from createRoom/joinRoom callback via custom prop drilling
  useEffect(() => {
    if (!socket) return;
    const wrap = (orig) => function (event, ...args) {
      if (event === 'createRoom' || event === 'joinRoom') {
        const cb = args[args.length - 1];
        if (typeof cb === 'function') {
          args[args.length - 1] = (r) => { if (r.ok && r.you) setMyId(r.you.id); cb(r); };
        }
      }
      return orig.apply(socket, [event, ...args]);
    };
    const orig = socket.emit.bind(socket);
    socket.emit = wrap(orig);
    return () => { socket.emit = orig; };
  }, [socket]);

  if (!socket) return <div className="p-8">連線中…</div>;
  if (!snap || snap.phase === 'WAITING' || !myId) return <Lobby socket={socket} onState={setSnap} />;
  return <Game snap={snap} socket={socket} myId={myId} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
